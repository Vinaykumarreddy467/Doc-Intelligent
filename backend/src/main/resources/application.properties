# DocuIntell Backend Configuration
spring.application.name=docuintell

# Server
server.port=8082

# H2 Database (in-memory for development)
spring.datasource.url=jdbc:h2:mem:docuintell
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (enable for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# AI Service
ai.service.url=http://localhost:8000
ai.service.timeout=600000

# Server timeouts
server.servlet.connection-timeout=600000
spring.mvc.async.request-timeout=600000

# CORS
cors.allowed-origins=http://localhost:4200,http://localhost:8081,http://localhost:5173

# JWT
jwt.secret=docuintell-secret-key-for-development-change-in-production
jwt.expiration=86400000

# Logging
logging.level.com.docuintell=DEBUG
logging.level.org.springframework.web=INFO