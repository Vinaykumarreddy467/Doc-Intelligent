version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: docuintell
      POSTGRES_PASSWORD: docuintell123
      POSTGRES_DB: docuintell
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434 # Requires host networking or this DNS for Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: ./backend
    ports:
      - "8082:8082"
    depends_on:
      - db
      - ai-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/docuintell
      - AI_SERVICE_URL=http://ai-service:8000

  frontend:
    build:
      context: ./frontend-react
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
